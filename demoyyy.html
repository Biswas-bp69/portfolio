<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Animation Box</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
      font-family:sans-serif;
    }

    .box{
      width:350px;
      height:250px;
      position:relative;
      overflow:hidden;
      border-radius:10px;
      cursor:pointer;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    /* Image */
    .box img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform 0.5s ease;
    }

    /* Text Content */
    .content{
      position:absolute;
      bottom:0;
      width:100%;
      padding:20px;
      background:rgba(0,0,0,0.5);
      color:#fff;
      transition:transform 0.5s ease, opacity 0.5s ease;
    }

    /* Hover Effect */
    .box:hover img{
      transform:scale(1.1);
    }

    .box:hover .content{
      transform:translateY(100%);
      opacity:0;
    }

    h2{
      margin-bottom:10px;
      font-size:22px;
    }

    p{
      font-size:16px;
    }

  </style>
</head>

<body>

  <div class="box">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature">
    
    <div class="content">
      <h2>Beautiful Nature</h2>
      <p>This is a sample description text.</p>
    </div>
  </div>

</body>
</html>
