<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Animation</title>

  <style>
    .animated-text {
      font-size: 60px;
      color: rgb(10, 0, 0);
      opacity: 0;
      animation: slideUp 1.5s ease forwards;
    }

    /* Bottom to Top */
    @keyframes slideUp {
      0% {
        transform: translateY(100px) scale(1);
        opacity: 0;
      }

      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }
  </style>

</head>

<body>

  <div class="container">
    <h1 class="animated-text">Welcome Biswas 🚀</h1>
  </div>

</body>

</html>
