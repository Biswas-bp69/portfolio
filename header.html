<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/abstract.css">
  <link rel="stylesheet" href="/css/layout/header.css">


</head>

<body>

  <header class="header container-fluid">

    <div class="container">
      <div class="row">
        <div class="col-lg-2 text-center text-lg-start">
          <img src="/logo.png" alt="quantum gen logo" class="logo">
        </div>
        <div class="p-0 d-flex  col-lg-5  align-items-lg-center justify-content-lg-center">

          <div class=" d-flex gap-lg-4 gap-1  mt-lg-0 w-100">
            <span class="menu d-lg-none">
              <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
              <div class="dropdown" id="myDropdown">
                <a href="../index.html" id="myLink">Home</a>
                <a href="../about.html" id="myLink">About</a>
                <a href="../project.html" id="myLink">Project</a>
                <a href="../blog.html" id="myLink">Blogs</a>
                <a href="../contact.html" id="myLink">Contact</a>
              </div>
            </span>
            <div class="searchTop ">
              <div class="searchArea d-flex gap-2 align-items-center ">
                <input type="text"><i class="fa-solid fa-magnifying-glass text-light"></i>
              </div>
            </div>


          </div>

        </div>
        <div class="col-lg-5 d-flex align-items-center navArea">
          <nav class="d-none d-lg-block ">
            <ul class="d-flex gap-3 m-0 align-items-center p-0">
              <li><a href="../index.html"><button class="navBtns" class="myLink">Home</button></a></li>
              <li><a href="../about.html"><button class="navBtns" class="myLink">About</button></a></li>
              <li><a href="../project.html"><button class="navBtns" class="myLink">Project</button></a></li>
              <li><a href="../blog.html"><button class="navBtns" class="myLink">Blogs</button></a></li>
              <li><a href="../contact.html"><button class="contact btnHover" class="myLink"><i
                      class="fa-solid fa-phone"></i>
                    Contact</button></li>
            </ul>
          </nav>
        </div>
      </div>
    </div>





    <style>



    </style>




  </header>






  <script>
    function toggleMenu() {
      document.getElementById("myDropdown").classList.toggle("show");
    }

    // Click outside close
    window.onclick = function (event) {
      if (!event.target.matches('.menu-btn')) {
        var dropdown = document.getElementById("myDropdown");
        if (dropdown.classList.contains('show')) {
          dropdown.classList.remove('show');
        }
      }
    }
  </script>
</body>

</html>
