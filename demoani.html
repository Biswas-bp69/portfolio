<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
    }

    .text {
      font-size: 40px;
      color: white;
      animation: moveUp 2s ease-out forwards;
    }

    @keyframes moveUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="text">Hello World</div>

</body>

</html>
