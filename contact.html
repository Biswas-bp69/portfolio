<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/page/contact.css">
  <link rel="stylesheet" href="./css/media.css">


  <style>

  </style>
</head>

<body>

  <div id="header"></div>
  <main class="shadow  ">

    <div class="container">
      <div class="row">
        <div class="col-lg-12 text-center contactHeader">
          <h3>Contact</h3>
          <p id="message">
            <!-- यो span भित्र HTML content राखिने छ -->
            <strong> <span id="text" class="text-success">If you have any questions or require assistance, please
                contact us using the information below. We will respond promptly.</span> </strong>
            <span id="cursor">|</span>
          </p>
        </div>
      </div>


      <section class="contactSection row downTopAni">
        <div class="col-lg-5  contacRight p-lg-5 pt-0 h-100">
          <div class="shadow p-3 p-lg-5">
            <div class="info-item d-flex aos-init aos-animate" data-aos="fade-up" data-aos-delay="200">
              <i class="fa-solid fa-location-dot"></i>
              <div>
                <h5>Address</h5>
                <p>A108 Adam Street, New York, NY 535022</p>
              </div>
            </div>
            <div class="info-item d-flex aos-init aos-animate mt-4" data-aos="fade-up" data-aos-delay="200">
              <i class="fa-solid fa-phone"></i>
              <div>
                <h5>Contact Us</h5>
                <p>+977 98xxxxxxxx</p>
              </div>
            </div>
            <div class="info-item d-flex aos-init aos-animate mt-4" data-aos="fade-up" data-aos-delay="200">
              <i class="fa-regular fa-envelope"></i>
              <div>
                <h5>Email Us</h5>
                <p>example@gmail.com</p>
              </div>
            </div>
          </div>

        </div>

        <div class="col-lg-7 contacLeft shadow p-3 p-lg-5 ">
          <div class="">
            <div class="row">
              <div class="col-md-6">
                <span>Name</span><br>
                <input type="text">
              </div>
              <div class="col-lg-6">
                <span>Email</span><br>
                <input type="email" name="email" id="email">
              </div>
            </div>
            <div class="col-12 mt-4">
              <span>Subject</span><br>
              <input type="text" class="w-100 p-2">
            </div>
            <div class="col-12 mt-4">
              <span>Message</span><br>
              <textarea name="textarea" class="mt-1 w-100" rows="8"></textarea>
            </div>
          </div>

          <div class="col-12 text-center">
            <button type="submit">Send Message</button>
          </div>
        </div>


      </section>


    </div>
  </main>

  <div id="footer"></div>
  <script>
    fetch('header.html')
      .then(Response => Response.text())
      .then(data => document.getElementById('header').innerHTML = data);
    fetch('footer.html')
      .then(Response => Response.text())
      .then(data => document.getElementById('footer').innerHTML = data);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
  <script src="./js/share.js"></script>
  <script src="./js/typing.js"></script>


</body>

</html>
